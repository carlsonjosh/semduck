[tox]
requires = tox>=4.24
env_list =
    py311-core-duckdb14
    py311-dbt
    py312-core-latest
    py312-dbt
    py313-core-latest
    py313-dbt
skip_missing_interpreters = true

[testenv]
package = skip
deps =
    pytest
    PyYAML
commands_pre =
    python -m pip install -e packages/semduck
commands = python -m pytest {posargs}

[testenv:{py311,py312,py313}-core-duckdb14]
description = Run the core package tests against DuckDB 1.4.x.
basepython =
    py311: /Users/joshuacarlson/.local/share/uv/python/cpython-3.11.12-macos-aarch64-none/bin/python3.11
    py312: /Users/joshuacarlson/.local/share/uv/python/cpython-3.12.10-macos-aarch64-none/bin/python3.12
    py313: /Users/joshuacarlson/.local/share/uv/python/cpython-3.13.3-macos-aarch64-none/bin/python3.13
deps =
    {[testenv]deps}
    duckdb==1.4.*
commands = python -m pytest packages/semduck/tests {posargs}

[testenv:{py311,py312,py313}-core-latest]
description = Run the core package tests against the latest supported DuckDB.
basepython =
    py311: /Users/joshuacarlson/.local/share/uv/python/cpython-3.11.12-macos-aarch64-none/bin/python3.11
    py312: /Users/joshuacarlson/.local/share/uv/python/cpython-3.12.10-macos-aarch64-none/bin/python3.12
    py313: /Users/joshuacarlson/.local/share/uv/python/cpython-3.13.3-macos-aarch64-none/bin/python3.13
deps =
    {[testenv]deps}
    duckdb>=1.4
commands = python -m pytest packages/semduck/tests {posargs}

[testenv:{py311,py312,py313}-dbt]
description = Run the dbt integration test against the dbt-duckdb 1.10 line.
basepython =
    py311: /Users/joshuacarlson/.local/share/uv/python/cpython-3.11.12-macos-aarch64-none/bin/python3.11
    py312: /Users/joshuacarlson/.local/share/uv/python/cpython-3.12.10-macos-aarch64-none/bin/python3.12
    py313: /Users/joshuacarlson/.local/share/uv/python/cpython-3.13.3-macos-aarch64-none/bin/python3.13
deps =
    {[testenv]deps}
    dbt-duckdb>=1.10,<1.11
commands = python -m pytest integration_tests/test_dbt_semduck_integration.py {posargs}
