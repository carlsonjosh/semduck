site_name: semduck
site_description: Portable semantic view runtime for DuckDB.
site_url: https://carlsonjosh.github.io/semduck/
repo_url: https://github.com/carlsonjosh/semduck
repo_name: carlsonjosh/semduck

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Interfaces:
      - Python API: interfaces/python-api.md
      - dbt: interfaces/dbt.md
      - MCP: interfaces/mcp.md
      - CLI: interfaces/cli.md
      - Ask: interfaces/ask.md
  - Guides:
      - How Semduck Works: guides/how-semduck-works.md
      - Defining Views: guides/semantic-definitions.md
      - Making Requests: guides/request-language.md
      - Choosing An Interface: guides/choosing-an-interface.md
      - MCP Best Practices: guides/mcp-best-practices.md
  - Reference:
      - API Surface: reference/api.md
      - Examples: reference/examples.md
      - Limitations: reference/limitations.md
