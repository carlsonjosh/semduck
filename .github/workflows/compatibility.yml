name: Compatibility

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  core:
    name: core / py${{ matrix.python-version }} / duckdb ${{ matrix.duckdb-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            duckdb-version: "1.1.*"
          - python-version: "3.10"
            duckdb-version: "1.2.*"
          - python-version: "3.11"
            duckdb-version: "1.2.*"
          - python-version: "3.12"
            duckdb-version: "1.3.*"
          - python-version: "3.12"
            duckdb-version: "latest"
          - python-version: "3.13"
            duckdb-version: "latest"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --ignore-requires-python --no-deps -e packages/semduck
          python -m pip install pytest PyYAML

      - name: Install DuckDB
        run: |
          if [ "${{ matrix.duckdb-version }}" = "latest" ]; then
            python -m pip install --upgrade duckdb
          else
            python -m pip install "duckdb==${{ matrix.duckdb-version }}"
          fi

      - name: Run core test suite
        run: python -m pytest packages/semduck/tests

      - name: Build package
        run: python -m pip wheel --no-deps --wheel-dir dist packages/semduck

  dbt:
    name: dbt / py${{ matrix.python-version }} / dbt-duckdb ${{ matrix.dbt-duckdb-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            dbt-duckdb-version: "1.9.*"
          - python-version: "3.12"
            dbt-duckdb-version: "1.9.*"
          - python-version: "3.12"
            dbt-duckdb-version: "latest"
          - python-version: "3.13"
            dbt-duckdb-version: "latest"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --ignore-requires-python --no-deps -e packages/semduck
          python -m pip install pytest PyYAML

      - name: Install dbt-duckdb
        run: |
          if [ "${{ matrix.dbt-duckdb-version }}" = "latest" ]; then
            python -m pip install --upgrade dbt-duckdb
          else
            python -m pip install "dbt-duckdb==${{ matrix.dbt-duckdb-version }}"
          fi

      - name: Run dbt integration test
        run: python -m pytest integration_tests/test_dbt_semduck_integration.py
