name: orders_semantic
description: Order-level ecommerce analytics across customers and segments
ai_context:
  concepts:
    - concept_id: marketing_campaign
      concept_kind: dimension
      phrases: [marketing campaign, marketing campaigns]

tables:
  - name: orders
    base_table:
      table: orders
    primary_key:
      columns: [order_id]
    dimensions:
      - name: order_id
        expr: order_id
        data_type: varchar
      - name: order_status
        expr: order_status
        data_type: varchar
      - name: sales_channel
        expr: sales_channel
        data_type: varchar
      - name: payment_method
        expr: payment_method
        data_type: varchar
        ai_context:
          concept_id: payment_method
          phrases: [payment method, payment methods]
    time_dimensions:
      - name: order_date
        expr: order_date
        data_type: date
        ai_context:
          concept_id: order_date
          phrases: [order date, purchase date]
    facts:
      - name: subtotal_amount
        expr: subtotal_amount
        data_type: double
      - name: discount_amount
        expr: discount_amount
        data_type: double
      - name: tax_amount
        expr: tax_amount
        data_type: double
      - name: shipping_amount
        expr: shipping_amount
        data_type: double
      - name: total_amount
        expr: total_amount
        data_type: double
    metrics:
      - name: gross_sales
        expr: sum(subtotal_amount)
      - name: total_discount
        expr: sum(discount_amount)
      - name: total_tax
        expr: sum(tax_amount)
        ai_context:
          concept_id: total_tax
          phrases: [tax]
      - name: total_shipping
        expr: sum(shipping_amount)
        ai_context:
          concept_id: total_shipping
          phrases: [shipping revenue]
      - name: net_sales
        expr: sum(total_amount)
        ai_context:
          concept_id: net_sales
          phrases: [net sales]
      - name: order_count
        expr: count(order_id)
        ai_context:
          concept_id: order_count
          phrases: [order count]
      - name: average_order_value
        expr: net_sales / order_count
        ai_context:
          concept_id: average_order_value
          phrases: [average order value]

  - name: customers
    base_table:
      table: customers
    primary_key:
      columns: [customer_id]
    dimensions:
      - name: customer_id
        expr: customer_id
        data_type: varchar
      - name: customer_name
        expr: customer_name
        data_type: varchar
      - name: customer_city
        expr: city
        data_type: varchar
      - name: customer_state
        expr: state
        data_type: varchar
        ai_context:
          concept_id: customer_state
          phrases: [customer state, customer states, state, states]
      - name: customer_country
        expr: country
        data_type: varchar
    time_dimensions:
      - name: signup_date
        expr: signup_date
        data_type: date
        ai_context:
          concept_id: signup_date
          phrases: [signup date, signed up, signup month]

joins:
  - name: orders_to_customers
    left_table: orders
    right_table: customers
    join_type: left
    join_expr: LEFT_TABLE.customer_id = RIGHT_TABLE.customer_id
