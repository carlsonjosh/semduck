name: customer_semantic
description: Customer-centric ecommerce analytics with order history and segment rollups
ai_context:
  concepts:
    - concept_id: recent
      concept_kind: modifier
      phrases: [recent, recently]
      default_window: 30 days
      time_dimension: order_date

tables:
  - name: customers
    base_table:
      table: customers
    primary_key:
      columns: [customer_id]
    dimensions:
      - name: customer_id
        expr: customer_id
        data_type: varchar
      - name: customer_name
        expr: customer_name
        data_type: varchar
      - name: email
        expr: email
        data_type: varchar
      - name: city
        expr: city
        data_type: varchar
      - name: state
        expr: state
        data_type: varchar
        ai_context:
          concept_id: customer_state
          phrases: [customer state, customer states, state, states]
      - name: country
        expr: country
        data_type: varchar
    time_dimensions:
      - name: signup_date
        expr: signup_date
        data_type: date
        ai_context:
          concept_id: signup_date
          phrases: [signup date, signed up, signup month, signup cohort, acquisition cohort]
    metrics:
      - name: customer_count
        expr: count(distinct customer_id)
        ai_context:
          concept_id: customer_count
          phrases: [customer count, customers]

  - name: customer_segments
    base_table:
      table: customer_segments
    primary_key:
      columns: [segment_id]
    dimensions:
      - name: segment_name
        expr: segment_name
        data_type: varchar
        ai_context:
          concept_id: segment_name
          phrases: [segment, segments]
      - name: segment_type
        expr: segment_type
        data_type: varchar

  - name: orders
    base_table:
      table: orders
    primary_key:
      columns: [order_id]
    dimensions:
      - name: order_status
        expr: order_status
        data_type: varchar
      - name: sales_channel
        expr: sales_channel
        data_type: varchar
        ai_context:
          concept_id: sales_channel
          phrases: [sales channel]
    time_dimensions:
      - name: order_date
        expr: order_date
        data_type: date
        ai_context:
          concept_id: order_date
          phrases: [order date]
    facts:
      - name: total_amount
        expr: total_amount
        data_type: double
    metrics:
      - name: order_count
        expr: count(order_id)
        ai_context:
          concept_id: order_count
          phrases: [order count]
      - name: lifetime_value
        expr: sum(total_amount)
        ai_context:
          concept_id: lifetime_value
          phrases: [lifetime value]
      - name: average_order_value
        expr: lifetime_value / order_count
        ai_context:
          concept_id: average_order_value
          phrases: [average order value]

joins:
  - name: customers_to_segments
    left_table: customers
    right_table: customer_segments
    join_type: left
    join_expr: LEFT_TABLE.segment_id = RIGHT_TABLE.segment_id

  - name: customers_to_orders
    left_table: customers
    right_table: orders
    join_type: left
    join_expr: LEFT_TABLE.customer_id = RIGHT_TABLE.customer_id
