[project]
name = "semduck"
version = "0.1.0"
description = "DuckDB semantic view loader and query compiler"
readme = "README.md"
requires-python = ">=3.11,<3.14"
license = "MIT"
license-files = ["LICENSE"]
keywords = ["duckdb", "semantic-layer", "analytics", "sql", "dbt"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Database",
  "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
  "duckdb>=1.4",
  "fastmcp>=2,<3",
  "numpy",
  "pydantic>=2,<3",
  "pydantic-ai-slim[openai]>=1,<2",
  "PyYAML",
]

[project.urls]
Homepage = "https://github.com/carlsonjosh/semduck"
Repository = "https://github.com/carlsonjosh/semduck"
Issues = "https://github.com/carlsonjosh/semduck/issues"

[project.optional-dependencies]
dbt = [
  "dbt-duckdb>=1.9,<1.11",
]

[project.scripts]
semduck = "semduck.cli:main"

[dependency-groups]
dev = [
  "pytest",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/semduck"]
