name: orders_semantic
description: Orders analytics semantic view

tables:
  - name: orders
    base_table:
      schema: mart
      table: orders_base
    primary_key:
      columns: [order_id]
    dimensions:
      - name: region
        expr: region
        data_type: varchar
    time_dimensions:
      - name: order_date
        expr: order_date
        data_type: date
    facts:
      - name: order_revenue
        expr: revenue
        data_type: double
      - name: order_profit
        expr: revenue - unit_costs
        data_type: double
    metrics:
      - name: row_profit_metric
        expr: order_profit
      - name: total_revenue
        expr: sum(order_revenue)
      - name: total_profit
        expr: sum(row_profit_metric)
      - name: margin_pct
        expr: total_profit / total_revenue
      - name: order_count
        expr: count(order_id)

  - name: customers
    base_table:
      schema: mart
      table: customers_base
    primary_key:
      columns: [customer_id]
    dimensions:
      - name: customer_segment
        expr: customer_segment
        data_type: varchar

joins:
  - name: orders_to_customers
    left_table: orders
    right_table: customers
    join_type: left
    join_expr: LEFT_TABLE.customer_id = RIGHT_TABLE.customer_id
