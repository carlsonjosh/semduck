llm:
  default_provider: ollama
  log_dir: .semduck/llm-logs
  # To use different models for planning and result summarization, define both tasks:
  tasks:
    ask_plan:
      provider: ollama
      model: qwen3.5:2b
    ask_summary:
      provider: ollama
      model: gemma3n
  providers:
    ollama:
      type: ollama
      model: qwen3.5:2b
      # model: lfm2.5-thinking
      base_url: http://localhost:11434/v1
